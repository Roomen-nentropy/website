# One-time helper: enable Pages from gh-pages branch (run manually if site is still 404)
name: Enable GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  administration: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Pages (gh-pages branch)
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X POST \
            -f build_type=legacy \
            -f source[branch]=gh-pages \
            -f source[path]=/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
